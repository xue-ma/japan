<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#102a43" />
  <title>Japan 2026 Timeline</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --bg-2: #e9f0ea;
      --card: rgba(255, 255, 255, 0.82);
      --card-strong: #ffffff;
      --text: #16202a;
      --muted: #5d6b79;
      --line: rgba(22, 32, 42, 0.12);
      --accent: #c86b3c;
      --accent-2: #2f6f6d;
      --accent-3: #735cdd;
      --shadow: 0 16px 42px rgba(25, 34, 44, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max: 860px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200, 107, 60, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(47, 111, 109, 0.16), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }

    .shell {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 14px 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 22px 18px 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(14px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -36px -70px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 180, 173, 0.28), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(47, 111, 109, 0.1);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(30px, 7vw, 48px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
      max-width: 52ch;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .meta {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(22, 32, 42, 0.08);
      border-radius: 18px;
      padding: 12px 12px 11px;
    }

    .meta span {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta strong {
      display: block;
      font-size: 15px;
      line-height: 1.3;
    }

    .route-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 2px 2px;
      margin: 0 -2px 18px;
      scrollbar-width: none;
    }

    .route-strip::-webkit-scrollbar { display: none; }

    .route-chip {
      flex: 0 0 auto;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(22, 32, 42, 0.1);
      background: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
      box-shadow: 0 8px 22px rgba(21, 32, 45, 0.05);
    }

    .timeline {
      position: relative;
      margin-top: 10px;
      padding-left: 18px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 7px;
      width: 2px;
      background: linear-gradient(180deg, rgba(200, 107, 60, 0.75), rgba(47, 111, 109, 0.65));
    }

    .entry {
      position: relative;
      margin-bottom: 16px;
      padding-left: 16px;
      animation: rise 0.42s ease both;
    }

    .entry::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(200, 107, 60, 0.14);
    }

    .entry.transit::before {
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(47, 111, 109, 0.13);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(22, 32, 42, 0.08);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(22, 32, 42, 0.06);
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.76));
    }

    .card-header h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .subline {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(200, 107, 60, 0.1);
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .panel-grid {
      display: grid;
      gap: 12px;
    }

    .panel {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(22, 32, 42, 0.08);
      border-radius: 18px;
      padding: 12px;
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .list li {
      position: relative;
      padding-left: 18px;
      color: var(--text);
      line-height: 1.55;
      font-size: 14px;
    }

    .list li::before {
      content: "•";
      position: absolute;
      left: 2px;
      top: 0;
      color: var(--accent-2);
      font-weight: 900;
    }

    .notice-grid {
      display: grid;
      gap: 8px;
    }

    .notice {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(47, 111, 109, 0.08);
      color: #244a48;
      font-size: 13px;
      line-height: 1.5;
    }

    .notice.warn {
      background: rgba(200, 107, 60, 0.1);
      color: #7d4124;
    }

    .notice .icon {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 1px;
    }

    .hours {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hours span {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(22, 32, 42, 0.06);
      color: var(--text);
      font-size: 12px;
      font-weight: 650;
    }

    .footer {
      margin-top: 18px;
      padding: 12px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .progress {
      margin-top: 14px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(22, 32, 42, 0.08);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .progress-bar {
      position: relative;
      height: 12px;
      border-radius: 999px;
      background: rgba(22, 32, 42, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.35s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 720px) {
      .shell { padding: 28px 20px 56px; }
      .meta-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .card-body { padding: 16px 18px 18px; }
      .timeline { padding-left: 22px; }
      .entry { padding-left: 20px; }
      .notice-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
